# snipemgr configuration template
# Copy this file to snipemgr.yaml and fill in your values.
# snipemgr.yaml is gitignored and must never be committed.

registry:
  sources:
    # GitHub users or orgs to scan for *2snipe integrations.
    # Add additional entries for private orgs or forks.
    - owner: jackvaughanjr
    # - owner: your-org-name
  require_manifest: true  # only show repos with a valid 2snipe.json (recommended)
  github_token: ""        # optional: GitHub PAT for higher rate limits (60 → 5000 req/hr)
                          # create at github.com/settings/tokens/new with public_repo scope
                          # (use "repo" scope if your *2snipe repos are private)

snipe_it:
  url: ""      # Snipe-IT instance URL (required for category management)
               # e.g. https://snipe.example.com
  api_key: "" # Snipe-IT API key (required for category management)
               # Admin → API Keys in your Snipe-IT instance
               # Note: once GCP is configured, these are read from Secret Manager
               # (snipe/snipe-url and snipe/snipe-token) — plain text here is optional

install:
  bin_dir: "~/.snipemgr/bin"  # directory where integration binaries are downloaded
                               # must be on your PATH or provide full path when running

gcp:
  project: ""            # GCP project ID (required for Phase 3+ features)
  region: "us-central1"  # GCP region for Cloud Run Jobs and Cloud Scheduler
  service_account: ""    # service account email for Cloud Run Jobs
                         # format: snipemgr-runner@your-project-id.iam.gserviceaccount.com
  scheduler_timezone: "UTC"  # IANA timezone for Cloud Scheduler cron triggers
                             # e.g. America/New_York, America/Chicago, America/Denver,
                             #      America/Los_Angeles, Europe/London, Asia/Tokyo
                             # Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
                             # Used as the default in non-interactive mode; the interactive
                             # wizard always prompts for timezone when scheduling is configured.
  # credentials_file: "" # optional: path to service account JSON key file
                         # leave blank to use Application Default Credentials (ADC)
                         # ADC is recommended for local use (gcloud auth application-default login)
                         # Use credentials_file for CI/CD or environments without gcloud
                         # surfaced in snipemgr init wizard (GCP section); path is validated at init time

state:
  path: "~/.snipemgr/state.json"  # local state file (tracks installed integrations)
  # gcs_bucket: ""                # optional: GCS bucket name for portable state across machines
                                  # e.g. "your-project-snipemgr-state"
